<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  {% seo %}
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Navigation -->
  <nav class="nav" id="nav">
    <a href="/" class="nav-logo">EvoBioSys</a>
    <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu">&#9776;</button>
    <ul class="nav-links" id="nav-links">
      <li><a href="/holons/">Holons</a></li>
      <li><a href="/capital/">Capital</a></li>
      <li><a href="/partners/">Partners</a></li>
      <li><a href="/publications/">Publications</a></li>
      <li><a href="/about/">About</a></li>
      <li><a href="/#connect" class="btn btn-sm btn-primary">Stay in the loop</a></li>
    </ul>
  </nav>

  {{ content }}

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-inner">
      <p>&copy; 2026 EvoBioSys &middot; Evolving Living Systems</p>
      <ul class="footer-links">
        <li><a href="/holons/">Holons</a></li>
        <li><a href="/capital/">Capital</a></li>
        <li><a href="/partners/">Partners</a></li>
        <li><a href="/publications/">Publications</a></li>
        <li><a href="/about/">About</a></li>
        <li><a href="mailto:connect@evobiosys.org">connect@evobiosys.org</a></li>
      </ul>
    </div>
  </footer>

  <script>
    // Navbar scroll effect
    const nav = document.getElementById('nav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 20);
    });

    // Mobile nav toggle
    const toggle = document.getElementById('nav-toggle');
    const links = document.getElementById('nav-links');
    if (toggle) {
      toggle.addEventListener('click', () => {
        links.classList.toggle('open');
      });
    }
  </script>
</body>
</html>
